<template>
  <!-- ¡AQUÍ ESTÁ LA MAGIA! h-style:--dynamic-bg="bgColor" -->
  <div class="counter-box" h-style:--dynamic-bg="bgColor">
    <h2>Contador AOT: <span h-text="count">0</span></h2>
    <button id="btn-inc" h-click="increment">+ Incrementar</button>
    <button id="btn-color">🎨 Cambiar Color</button>
  </div>
</template>

<style>
  .counter-box { 
    border: 1px solid #04d361; 
    padding: 1.5rem;
    border-radius: 8px; 
    /* Usamos la variable CSS dinámica con un fallback (#141416) */
    background-color: var(--dynamic-bg, #141416); 
    color: lightcyan; 
    transition: background-color 0.4s ease; /* Transición suave nativa del navegador */
  }
  .counter-box button { 
    background: #04d361; color: #000; font-weight: bold; 
    border: none; padding: 0.5rem 1rem; cursor: pointer; margin-right: 0.5rem; 
  }
</style>

<script>
import { createSignal, readSignal, writeSignal } from '../core/reactive.js';

export default {
  setup() {
    const count = createSignal(0);

    return { 
      count,
      bgColor: createSignal('#141416'), // Valor inicial de la variable CSS
      increment: () => writeSignal(count, readSignal(count) + 1)
    }; 
  },
  events(context) {
    return {
      // '#btn-inc': {
      //   click: () => {
      //     const current = readSignal(context.count);
      //     writeSignal(context.count, current + 1);
      //   }
      // },
      '#btn-color': {
        click: () => {
          const colors = ['#141416', '#2d1b4e', '#0f3b21', '#4a1515', '#15304a'];
          const current = readSignal(context.bgColor);
          const nextIndex = (colors.indexOf(current) + 1) % colors.length;
          // Al escribir en la señal, el motor reactivo actualizará la variable CSS automáticamente
          writeSignal(context.bgColor, colors[nextIndex]);
        }
      }
    }
  }
}
</script>
