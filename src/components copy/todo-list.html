<style>
  /* CSS Scoped automáticamente por el compilador Go */
  .todo-app { max-width: 600px; margin: 2rem auto; background: #141416; border: 1px solid #232326; border-radius: 12px; padding: 1.5rem; }
  .todo-header { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .todo-input { flex: 1; background: #0c0c0e; border: 1px solid #333; color: #e1e1e6; padding: 0.75rem; border-radius: 6px; outline: none; }
  .todo-input:focus { border-color: #04d361; }
  .todo-btn { background: #04d361; color: #000; border: none; padding: 0.75rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
  .todo-btn:hover { opacity: 0.9; }
  .todo-btn.danger { background: #ff4444; color: white; }
  .todo-filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .filter-btn { background: #232326; color: #888; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { color: #e1e1e6; }
  .filter-btn.active { background: #04d361; color: #000; }
  .todo-list { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; }
  .todo-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: #1c1c1f; margin-bottom: 0.5rem; border-radius: 6px; border-left: 3px solid #04d361; transition: all 0.2s; }
  .todo-item.completed { opacity: 0.5; border-left-color: #555; }
  .todo-item.completed .todo-text { text-decoration: line-through; color: #888; }
  .todo-toggle { width: 20px; height: 20px; cursor: pointer; accent-color: #04d361; }
  .todo-text { flex: 1; color: #e1e1e6; }
  .btn-delete { background: transparent; border: none; color: #ff4444; cursor: pointer; font-size: 1.2rem; padding: 0.25rem; }
  .btn-delete:hover { transform: scale(1.1); }
  .todo-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #232326; color: #888; font-size: 0.9rem; }
  .empty-state { text-align: center; color: #555; padding: 2rem; font-style: italic; }
</style>

<template>
  <div class="todo-app">
    <div class="todo-header">
      <p h-text="inputValue"></p>
      <input id="todo-input" h-sync="inputValue" class="todo-input" type="text" placeholder="¿Qué necesitas hacer?" />
      <button id="btn-add" class="todo-btn">Añadir</button>
    </div>
    
    <div class="todo-filters">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="active">Activos</button>
      <button class="filter-btn" data-filter="completed">Completados</button>
    </div>

    <div class="empty-container">
      <div class="empty-state" h-show="isEmpty">No hay tareas pendientes</div>
    </div>
    
    <ul class="todo-list">
       <template h-each="todo in context.filteredTodos" h-key="id">
        <li class="todo-item">
          <input type="checkbox" class="todo-toggle" />
          <span class="todo-text" h-text="todo.text"></span>
          <button class="btn-delete">🗑️</button>
        </li>
      </template>
    </ul>
    
    <div class="todo-footer">
      <span>Activos: <strong h-text="activeCount">0</strong></span>
      <button id="btn-clear" class="todo-btn danger">Limpiar completados</button>
    </div>
  </div>
</template>

<script>
  import { createSignal, readSignal, writeSignal, createComputed } from '../core/reactive.js';

  export default {
    setup() {
      // 1. Inicialización de estado primario
      const saved = localStorage.getItem('hannah-todos');
      let initialTodos = saved ? JSON.parse(saved) : [];
      
      // let tmplist = []
      // for (let index = 0; index < 3000; index++) {
      //   tmplist = [...tmplist, { id: Date.now().toString(), text: `item ${index}`, completed: false }];
      // }
      // initialTodos = []

      const data = createSignal(() => ({
        todos: initialTodos,
        inputValue: '',
        filter: 'all'
      }))

      const complex = createComputed(() => ({
        filteredTodos() {
          const currentTodos = readSignal(todos);
          const currentFilter = readSignal(filter);

          if (currentFilter === 'active') return currentTodos.filter(t => !t.completed);
          if (currentFilter === 'completed') return currentTodos.filter(t => t.completed);
          return currentTodos;
        },
        activeCount() {
          return readSignal(todos).filter(t => !t.completed).length;
        },
        isEmpty() {
          return readSignal(todos).length === 0;
        }
      }));

      const methods = createMethods((ctx) => ({
        method1() {

        },
        method2() {

        },
        method3() {

        }
      }))

      const events = createEvents((ctx) => {
        const sync = (currentArray) => {
          localStorage.setItem('hannah-todos', JSON.stringify(currentArray));
          
          // Zero-GC: Aplicación de propiedades físicas con microtareas para evitar layout thrashing
          queueMicrotask(() => {
            const items = document.querySelectorAll('.todo-item');
            items.forEach(item => {
              const textEl = item.querySelector('.todo-text');
              if (!textEl) return;
              const todo = currentArray.find(t => t.text === textEl.textContent);
              if (todo) {
                const checkbox = item.querySelector('.todo-toggle');
                if (checkbox) checkbox.checked = todo.completed;
                if (todo.completed) item.classList.add('completed');
                else item.classList.remove('completed');
              }
            });
          });
        };

        // Hidratación asíncrona inicial de propiedades booleanas
        setTimeout(() => sync(readSignal(ctx.todos)), 0);  

        return {
          '#btn-add': {
            click: () => {
              const text = readSignal(ctx.inputValue).trim();
              if (!text) return;
              
              // 🚨 Corrección Crítica: Leer el array actual, no el de inicio
              const currentTodos = [...readSignal(ctx.todos)];
              currentTodos.push({ id: Date.now().toString(), text, completed: false });
              
              writeSignal(ctx.todos, currentTodos);
              writeSignal(ctx.inputValue, '');
              
              const inputEl = document.getElementById('todo-input');
              if(inputEl) inputEl.value = '';

              sync(currentTodos);
            }
          },
          '#todo-input': {
            keydown: (e) => e.key === 'Enter' && document.getElementById('btn-add').click(),
            // input: (e) => writeSignal(ctx.inputValue, e.target.value)
          },
          '.todo-toggle': {
            change: (e) => {
              const itemEl = e.target.closest('li');
              const textEl = itemEl.querySelector('.todo-text');
              const currentTodos = [...readSignal(ctx.todos)];
              
              const todo = currentTodos.find(t => t.text === textEl.textContent);
              if (todo) {
                todo.completed = e.target.checked;
                writeSignal(ctx.todos, currentTodos);
                sync(currentTodos);
              }
            }
          },
          '.btn-delete': {
              click: (e) => {
                  const itemEl = e.target.closest('.todo-item');
                  const textEl = itemEl.querySelector('.todo-text');
                  let currentTodos = readSignal(ctx.todos);
                  
                  currentTodos = currentTodos.filter(t => t.text !== textEl.textContent);
                  
                  writeSignal(ctx.todos, currentTodos); 
                  sync(currentTodos);
              }
          },
          '.filter-btn': {
            click: (e) => {
              document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
              e.target.classList.add('active');
              
              // Reemplazo de lógica imperativa. Solo mutamos el estado primario y el motor responde.
              writeSignal(ctx.filter, e.target.dataset.filter);
              
              // Sincronizamos las propiedades visuales tras el filtrado
              sync(readSignal(ctx.todos));
            }
          },
          '#btn-clear': {
            click: () => {
              let currentTodos = readSignal(ctx.todos);
              currentTodos = currentTodos.filter(t => !t.completed);
              
              writeSignal(ctx.todos, currentTodos);
              sync(currentTodos);
            }
          }
        }
      })

      return {
        data,
        complex,
        methods,
        events
      }
    },
  }
</script>
