<style>
  .panel {
    padding: 2rem;
    border-radius: 12px;
    max-width: 500px;
    margin: 2rem auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
  }
  .panel.dark-mode {
    background: #1a1a1e;
    color: #e1e1e6;
    border: 1px solid #333;
  }
  .panel.light-mode {
    background: #f0f0f5;
    color: #1a1a1e;
    border: 1px solid #ccc;
  }
  .controls { display: flex; flex-direction: column; gap: 1rem; }
  .control-row { display: flex; align-items: center; gap: 1rem; justify-content: space-between; }
  label { font-weight: bold; }
  input[type="text"], input[type="color"] {
    padding: 0.5rem;
    border-radius: 6px;
    border: 1px solid #555;
    background: #2a2a2e;
    color: #e1e1e6;
    flex: 1;
  }
  .preview-box {
    padding: 1rem;
    border-radius: 8px;
    margin-top: 1rem;
    text-align: center;
    font-weight: bold;
    transition: all 0.3s ease;
  }
  .tag {
    display: inline-block;
    padding: 0.2rem 0.8rem;
    border-radius: 20px;
    font-size: 0.8rem;
    background: rgba(4, 211, 97, 0.2);
    color: #04d361;
    margin-left: 0.5rem;
  }
  .tag.warning { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
  .tag.danger { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
  button {
    background: #04d361;
    color: #000;
    border: none;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.8; }
  .reset-btn { background: #ff4444; color: white; }
</style>

<template>
  <div class="panel" h-bind:class="panelClasses">
    <h2>🎨 Panel de Tema</h2>

    <div class="controls">
      <div class="control-row">
        <label>Modo:</label>
        <div>
          <button h-on:click="toggleDarkMode" style="margin-right: 0.5rem">
            <span h-text="modeLabel"></span>
          </button>
          <button h-on:click="toggleAdvanced">⚙️ Avanzado</button>
        </div>
      </div>

      <div class="control-row" h-show="showAdvanced">
        <label>Color de fondo:</label>
        <input type="color" h-sync="bgColor" />
        <input type="text" h-sync="bgColor" placeholder="#hex" style="flex: 1;" />
      </div>

      <div class="control-row" h-show="showAdvanced">
        <label>Color de texto:</label>
        <input type="color" h-sync="textColor" />
      </div>

      <div class="control-row">
        <label>Etiqueta de estado:</label>
        <span h-bind:class="tagClasses">
          <span h-text="statusText">Normal</span>
        </span>
        <button h-on:click="cycleStatus">🔄 Cambiar estado</button>
      </div>

      <div class="control-row">
        <label>Estilo avanzado:</label>
        <button h-on:click="applyRandomStyle">🎲 Aleatorio</button>
        <button h-on:click="resetStyles" class="reset-btn">↺ Reset</button>
      </div>
    </div>

    <div class="preview-box" h-style="previewStyles">
      <p>
        <span h-text="previewMessage">Hola mundo</span>
        <span class="tag" h-bind:class="tagClasses">Reactivo</span>
      </p>
      <small>Este estilo cambia con el color de fondo y texto.</small>
    </div>

    <p style="margin-top: 1.5rem; font-size: 0.8rem; opacity: 0.7; text-align: center;">
      ⚡ Todo es reactivo: h-style, h-bind:class, h-sync, h-on:click, h-show, h-text, etc.
    </p>
  </div>
</template>

<script>
export default {
  data() {
    return {
      darkMode: false,
      showAdvanced: false,
      bgColor: '#1a1a1e',
      textColor: '#e1e1e6',
      status: 0,
      basePadding: '1rem'
    };
  },
  computed: {
    panelClasses(ctx) {
      return {
        'dark-mode': ctx.darkMode,
        'light-mode': !ctx.darkMode
      };
    },
    previewStyles(ctx) {
      return {
        backgroundColor: ctx.bgColor,
        color: ctx.textColor,
        padding: ctx.basePadding,
        border: '2px solid ' + ctx.bgColor
      };
    },
    tagClasses(ctx) {
      const s = ctx.status;
      return [
        s === 0 ? '' : s === 1 ? 'warning' : 'danger',
        s === 0 ? '' : 'tag'
      ].filter(Boolean);
    },
    statusText(ctx) {
      const s = ctx.status;
      return s === 0 ? '🟢 Normal' : s === 1 ? '🟡 Advertencia' : '🔴 Crítico';
    },
    previewMessage(ctx) {
      const s = ctx.status;
      return s === 0 ? 'Todo en orden' : s === 1 ? 'Alerta moderada' : '¡Alerta máxima!';
    },
    modeLabel(ctx) {
      return ctx.darkMode ? '🌙 Oscuro' : '☀️ Claro';
    }
  },
  methods: {
    toggleDarkMode(ctx) {
      console.log('toggleDarkMode ejecutado');
      ctx.darkMode = !ctx.darkMode;
    },
    toggleAdvanced(ctx) {
      ctx.showAdvanced = !ctx.showAdvanced;
    },
    cycleStatus(ctx) {
      ctx.status = (ctx.status + 1) % 3;
    },
    applyRandomStyle(ctx) {
      const colors = ['#2d1b4e', '#0f3b21', '#4a1515', '#15304a', '#3a2a5a', '#1e4a3a', '#5a2a2a'];
      const texts = ['#f0f0f5', '#e1e1e6', '#ffd700', '#ff6b6b', '#a8e6cf'];
      const pads = ['0.5rem', '1rem', '1.5rem', '2rem', '2.5rem'];
      const rand = arr => arr[Math.floor(Math.random() * arr.length)];
      ctx.bgColor = rand(colors);
      ctx.textColor = rand(texts);
      ctx.basePadding = rand(pads);
    },
    resetStyles(ctx) {
      console.log('resetStyles ejecutado');
      ctx.bgColor = '#1a1a1e';
      ctx.textColor = '#e1e1e6';
      ctx.basePadding = '1rem';
      ctx.darkMode = false;
      ctx.showAdvanced = false;
      ctx.status = 0;
    }
  }
}
</script>
